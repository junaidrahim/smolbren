name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: build
        run: uv build

      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/smolbren
    permissions:
      id-token: write
    steps:
      - name: download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
