name: release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # push release commits/tags, create GitHub releases

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  release:
    needs: test
    runs-on: ubuntu-latest
    # never let two pushes race a release
    concurrency: crates-publish
    steps:
      - uses: actions/checkout@v4
        with:
          # release-plz needs full history and tags to compute the next version
          fetch-depth: 0
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz

      # Bump Cargo.toml/Cargo.lock and CHANGELOG.md from the conventional
      # commits since the last release, then push the bump back to main.
      # Pushes made with GITHUB_TOKEN don't trigger workflows, so this
      # can't loop. Merges with no release-triggering commits (see
      # release-plz.toml) leave the tree clean and skip the commit.
      - name: Bump version from conventional commits
        run: |
          release-plz update
          if ! git diff --quiet; then
            VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: release v$VERSION"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publishes to crates.io, tags vX.Y.Z, and creates the GitHub release.
      # Runs unconditionally: it only publishes versions not yet on
      # crates.io, so a release that previously failed mid-way is picked
      # up by the next push.
      - name: Release to crates.io
        run: release-plz release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
